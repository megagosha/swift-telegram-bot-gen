line_length:
  warning: 120
  error: 160
  ignores_comments: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 5
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 3
    error: 2
  excluded:
    - ok

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - contains_over_first_not_nil
  - sorted_imports
  - modifier_order
  - unowned_variable_capture
  - force_unwrapping

analyzer_rules:
  - unused_import

disabled_rules:
  - trailing_comma

force_cast: error
force_try: error

excluded:
  - .build
  - Resources
  - Plugins
  - Sources/TGBotAPICodegenLib
  - Sources/TGBotAPICodegen
  - Tests/TGBotAPICodegenTests
  - GeneratedOutput
